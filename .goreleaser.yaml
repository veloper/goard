version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: goard
    binary: goard
    main: ./cmd/goard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: goardctl
    binary: goardctl
    main: ./cmd/goardctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: binaries
    formats: ["tar.gz"]
    files:
      - LICENSE

dockers:
  - image_templates:
      - "veloper/goard:{{ .Version }}"
      - "veloper/goard:latest"
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--label=org.opencontainers.image.title=goard"
      - "--label=org.opencontainers.image.version={{ .Version }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
