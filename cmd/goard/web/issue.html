<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goard — Issue</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f5f7;color:#1a1a2e;padding:0;min-height:100vh}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
.page{max-width:820px;margin:0 auto;padding:0 24px 48px}

/* nav */
.nav{display:flex;align-items:center;gap:12px;padding:14px 24px;max-width:820px;margin:0 auto;font-size:14px;position:sticky;top:0;background:#f4f5f7;z-index:10}
.nav a{color:#555;display:flex;align-items:center;gap:4px}
.nav a:hover{color:#2563eb}
.nav .readonly{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-left:auto}

/* header area */
.head{margin-top:24px}
.slug{font-size:12px;color:#999;font-weight:500;margin-bottom:4px}
.title{font-size:24px;font-weight:700;line-height:1.3;color:#111}

/* split pills */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0}
.spill{display:inline-flex;font-size:12px;border-radius:5px;overflow:hidden;font-weight:500}
.spill-lbl{padding:3px 6px;background:#e0e0e0;color:#666}
.spill-val{padding:3px 8px}
.spill.s-backlog .spill-val{background:#e8e8e8;color:#555}
.spill.s-in_progress .spill-val{background:#dbeafe;color:#1e40af}
.spill.s-review .spill-val{background:#fef9c3;color:#854d0e}
.spill.s-done .spill-val{background:#dcfce7;color:#166534}
.spill.s-cancelled .spill-val{background:#fee2e2;color:#991b1b}
.spill.t-bug .spill-val{background:#fee2e2;color:#991b1b}
.spill.t-feature .spill-val{background:#dbeafe;color:#1e40af}
.spill.t-chore .spill-val{background:#f0f0f0;color:#555}
.spill.t-improvement .spill-val{background:#dcfce7;color:#166534}
.spill.p-1 .spill-val{background:#fee2e2;color:#b91c1c}
.spill.p-2 .spill-val{background:#ffedd5;color:#c2410c}
.spill.p-3 .spill-val{background:#fef9c3;color:#a16207}
.spill.p-4 .spill-val{background:#dcfce7;color:#166534}
.spill.user .spill-val{background:#f0f0f0;color:#444}

/* description */
.desc-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:20px;margin:20px 0}
.desc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#999;margin-bottom:10px}
.desc-body{font-size:14px;line-height:1.65;white-space:pre-wrap;color:#333}

/* comments section */
.comments-wrap{margin-top:24px}
.comments-head{font-size:15px;font-weight:600;color:#333;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
.comments-empty{padding:24px 0;color:#999;font-size:13px;font-style:italic}
.comment{display:flex;gap:12px;padding:12px 0}
.comment-avatar{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#555;text-transform:uppercase}
.comment-body{flex:1;min-width:0}
.comment-head{font-size:13px;margin-bottom:2px;display:flex;align-items:baseline;gap:8px}
.comment-author{font-weight:600;color:#1a1a2e}
.comment-time{font-size:11px;color:#999}
.comment-text{font-size:14px;line-height:1.55;white-space:pre-wrap;color:#444;margin-top:6px}

/* states */
.loading{text-align:center;padding:60px 0;color:#888;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;color:#b91c1c;font-size:14px;display:none;margin-bottom:16px}
.error.show{display:block}
hr{display:none}
</style>
</head>
<body>

<div class="nav">
  <a href="javascript:history.back()">← Back</a>
  <span class="readonly">Read only</span>
</div>

<div class="page">
  <div class="error" id="error"></div>
  <div class="loading" id="loading"><span class="spinner"></span>Loading issue…</div>
  <div id="content" style="display:none"></div>
</div>

<script>
const PAT = localStorage.getItem('pat') || '';
if (!PAT) { window.location.href = '/login'; }
const issueId = location.pathname.split('/')[2];
const PRIORITY = ['none','urgent','high','medium','low'];

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Authorization': `Bearer ${opts.pat || PAT}`, 'Content-Type': 'application/json', ...opts.headers },
    method: opts.method || 'GET',
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})).then(d => d.meta?.error || d.error || res.statusText); throw new Error(e); }
  if (res.status === 204) return null;
  const env = await res.json();
  if (env.meta && env.meta.error) throw new Error(env.meta.error);
  return env.data;
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.classList.add('show');
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function esc(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

function avatar(name) {
  return (name || '?').charAt(0).toUpperCase();
}

async function load() {
  try {
    const [issue, comments] = await Promise.all([
      api(`/api/issues/${issueId}`),
      api(`/api/issues/${issueId}/comments`),
    ]);

    document.title = esc(issue.slug || '#'+issue.id) + ' ' + esc(issue.title) + ' — Goard';

    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('content');

    el.innerHTML = `
      <div class="head">
        <div class="slug">${esc(issue.slug || '#'+issue.id)}</div>
        <div class="title">${esc(issue.title)}</div>
      </div>

      <div class="pills">
        <span class="spill s-${issue.state}"><span class="spill-lbl">State</span><span class="spill-val">${issue.state.replace(/_/g, ' ')}</span></span>
        <span class="spill t-${issue.type}"><span class="spill-lbl">Type</span><span class="spill-val">${issue.type}</span></span>
        <span class="spill p-${issue.priority}"><span class="spill-lbl">Priority</span><span class="spill-val">${PRIORITY[issue.priority] || issue.priority}</span></span>
        ${issue.assignee ? `<span class="spill user"><span class="spill-lbl">Assignee</span><span class="spill-val">${esc(issue.assignee.username)}</span></span>` : ''}
        ${issue.created_by ? `<span class="spill user"><span class="spill-lbl">By</span><span class="spill-val">${esc(issue.created_by.username)}</span></span>` : ''}
        ${issue.created_at ? `<span class="spill user"><span class="spill-lbl">Created</span><span class="spill-val">${fmtDate(issue.created_at)}</span></span>` : ''}
      </div>

      ${issue.description ? `
        <div class="desc-wrap">
          <div class="desc-label">Description</div>
          <div class="desc-body">${esc(issue.description)}</div>
        </div>
      ` : ''}

      <div class="comments-wrap">
        <div class="comments-head">Comments${comments ? ' (' + comments.length + ')' : ''}</div>
        ${!comments || comments.length === 0
          ? '<div class="comments-empty">No comments.</div>'
          : comments.map(c => {
              const name = c.author ? c.author.username : '?';
              return `
                <div class="comment">
                  <div class="comment-avatar">${avatar(name)}</div>
                  <div class="comment-body">
                    <div class="comment-head">
                      <span class="comment-author">${esc(name)}</span>
                      <span class="comment-time">${fmtDate(c.created_at)}</span>
                    </div>
                    <div class="comment-text">${esc(c.body)}</div>
                  </div>
                </div>
              `;
            }).join('')
        }
      </div>
    `;

    el.style.display = 'block';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    showError('Failed to load issue: ' + e.message);
    document.getElementById('content').innerHTML = '<div style="padding:40px 0;color:#888;text-align:center">Could not load this issue.</div>';
    document.getElementById('content').style.display = 'block';
  }
}

load();

function wsConnect() {
  const pat = document.querySelector('meta[name="default-pat"]')?.content || '';
  if (!pat) return;
  const ws = new WebSocket('ws://' + location.host + '/api/ws?pat=' + pat);
  ws.onclose = () => { setTimeout(wsConnect, 3000); };
  ws.onerror = () => { ws.close(); };
  ws.onmessage = (msg) => {
    try { const ev = JSON.parse(msg.data); if (ev.type.startsWith('issue_') || ev.type.startsWith('comment_')) load(); } catch(e) {}
  };
}
wsConnect();
</script>
</body>
</html>
