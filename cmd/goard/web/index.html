<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f5f7;color:#1a1a2e;padding:32px 24px}
h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px}
h1 small{font-size:13px;font-weight:400;color:#888;margin-left:auto}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
.page{max-width:960px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:#fff;border-radius:8px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:box-shadow .15s,border-color .15s;border:1px solid transparent}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12);border-color:#e0e0e0}
.card-title{font-size:16px;font-weight:600;color:#1a1a2e}
.card-desc{color:#666;font-size:13px;margin-top:4px;line-height:1.4}
.card-meta{display:flex;gap:12px;margin-top:10px;font-size:12px;color:#888}
.card-meta span{display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:48px 24px;color:#888;font-size:14px;grid-column:1/-1}
.empty strong{color:#555}
.error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;color:#b91c1c;font-size:14px;display:none;margin-bottom:16px}
.error.show{display:block}
.loading{text-align:center;padding:48px 24px;color:#888;font-size:14px;grid-column:1/-1}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Goard <small>project tracker</small></h1>
  </div>
  <div class="error" id="error"></div>
  <div class="grid" id="grid">
    <div class="loading"><span class="spinner"></span>Loading projects…</div>
  </div>
</div>

<script>
const PAT = localStorage.getItem('pat') || '';
if (!PAT) { window.location.href = '/login'; }

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Authorization': `Bearer ${opts.pat || PAT}`, 'Content-Type': 'application/json', ...opts.headers },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})).then(d => d.meta?.error || d.error || res.statusText); throw new Error(e); }
  if (res.status === 204) return null;
  const env = await res.json();
  if (env.meta && env.meta.error) throw new Error(env.meta.error);
  return env.data;
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}

async function load() {
  const grid = document.getElementById('grid');
  try {
    const projects = await api('/api/projects');
    if (!projects || projects.length === 0) {
      grid.innerHTML = '<div class="empty"><strong>No projects yet.</strong><br>Create one via the MCP server or API.</div>';
      return;
    }
    grid.innerHTML = projects.map(p => `
      <a href="/projects/${p.id}" class="card">
        <div class="card-title">${p.name}</div>
        ${p.description ? `<div class="card-desc">${esc(p.description)}</div>` : ''}
        <div class="card-meta">
          <span>#${p.id}</span>
          <span>${p.created_by ? 'by ' + esc(p.created_by.username) : ''}</span>
        </div>
      </a>
    `).join('');
  } catch (e) {
    showError(e.message);
    grid.innerHTML = '<div class="empty">Failed to load projects.</div>';
  }
}

function esc(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

load();

function wsConnect() {
  const pat = document.querySelector('meta[name="default-pat"]')?.content || '';
  if (!pat) return;
  const ws = new WebSocket('ws://' + location.host + '/api/ws?pat=' + pat);
  ws.onclose = () => { setTimeout(wsConnect, 3000); };
  ws.onerror = () => { ws.close(); };
  ws.onmessage = (msg) => {
    try { const ev = JSON.parse(msg.data); if (ev.type.startsWith('project_')) load(); } catch(e) {}
  };
}
wsConnect();
</script>
</body>
</html>
