<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Roomy Ticketer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
h1 { margin-bottom: 16px; }
.card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); }
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }
.btn { background: #2563eb; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #1d4ed8; }
.form-row { margin-bottom: 8px; }
.form-row input, .form-row textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
.project-name { font-size: 18px; font-weight: 600; }
.project-desc { color: #666; margin-top: 4px; font-size: 14px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.4); align-items: center; justify-content: center; }
.modal.open { display: flex; }
.modal-content { background: #fff; padding: 24px; border-radius: 8px; width: 400px; }
</style>
</head>
<body>
<h1>Projects</h1>
<button class="btn" onclick="showCreate()">+ New Project</button>
<div id="projects"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>New Project</h2>
    <div class="form-row"><input id="pname" placeholder="Project name"></div>
    <div class="form-row"><textarea id="pdesc" placeholder="Description" rows="3"></textarea></div>
    <button class="btn" onclick="createProject()">Create</button>
    <button class="btn" style="background:#999;margin-left:8px" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const PAT = localStorage.getItem('pat') || '';
if (!PAT) { window.location.href = '/login'; }

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Authorization': `Bearer ${opts.pat || PAT}`, 'Content-Type': 'application/json', ...opts.headers },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 204) return null;
  const env = await res.json();
  if (env.meta && env.meta.error) throw new Error(env.meta.error);
  return env.data;
}

async function load() {
  const projects = await api('/api/projects');
  document.getElementById('projects').innerHTML = projects.map(p => `
    <div class="card">
      <a href="/projects/${p.id}" class="project-name">${p.name}</a>
      ${p.description ? `<div class="project-desc">${p.description}</div>` : ''}
    </div>
  `).join('');
}

function showCreate() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function createProject() {
  const name = document.getElementById('pname').value;
  const desc = document.getElementById('pdesc').value;
  if (!name) return;
  await api('/api/projects', { method: 'POST', body: { name, description: desc } });
  document.getElementById('pname').value = '';
  document.getElementById('pdesc').value = '';
  closeModal();
  wsConnect();
load();
}

load();

function wsConnect() {
  const pat = document.querySelector('meta[name="default-pat"]')?.content || '';
  if (!pat) return;
  const ws = new WebSocket('ws://' + location.host + '/api/ws?pat=' + pat);
  ws.onopen = () => {};
  ws.onclose = () => { setTimeout(wsConnect, 3000); };
  ws.onerror = () => { ws.close(); };
  ws.onmessage = (msg) => {
    try {
      const ev = JSON.parse(msg.data);
      if (ev.type.startsWith('project_') || ev.type.startsWith('issue_') || ev.type.startsWith('comment_')) {
        load();
      }
    } catch(e) {}
  };
}

</script>
</body>
</html>
