<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Roomy Ticketer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
h1 { margin-bottom: 16px; }
a { color: #2563eb; text-decoration: none; }
.board { display: flex; gap: 12px; overflow-x: auto; min-height: 60vh; }
.column { background: #e8e8e8; border-radius: 8px; padding: 12px; min-width: 250px; flex: 1; }
.column h3 { font-size: 13px; text-transform: uppercase; color: #666; margin-bottom: 8px; }
.card { background: #fff; border-radius: 6px; padding: 12px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.1); cursor: pointer; }
.card:hover { box-shadow: 0 2px 6px rgba(0,0,0,.15); }
.card .seq { font-size: 11px; color: #999; }
.card .title { font-weight: 500; margin: 4px 0; }
.card .assignee { font-size: 12px; color: #666; }
.priority-1 { border-left: 3px solid #ef4444; }
.priority-2 { border-left: 3px solid #f97316; }
.priority-3 { border-left: 3px solid #eab308; }
.priority-4 { border-left: 3px solid #22c55e; }
.btn { background: #2563eb; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #1d4ed8; }
.btn-sm { padding: 4px 10px; font-size: 12px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
.btn-sm:hover { background: #1d4ed8; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.4); align-items: center; justify-content: center; }
.modal.open { display: flex; }
.modal-content { background: #fff; padding: 24px; border-radius: 8px; width: 440px; max-height: 80vh; overflow-y: auto; }
.form-row { margin-bottom: 8px; }
.form-row input, .form-row textarea, .form-row select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
.back { margin-bottom: 16px; display: block; }
</style>
</head>
<body>
<a href="/" class="back">← Projects</a>
<h1 id="project-name"></h1>
<button class="btn" onclick="showCreate()">+ New Issue</button>
<div class="board" id="board"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>New Issue</h2>
    <div class="form-row"><input id="ititle" placeholder="Title"></div>
    <div class="form-row"><textarea id="ibody" placeholder="Description" rows="4"></textarea></div>
    <div class="form-row">
      <select id="iassignee"><option value="">Unassigned</option></select>
    </div>
    <button class="btn" onclick="createIssue()">Create</button>
    <button class="btn" style="background:#999;margin-left:8px" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const PAT = localStorage.getItem('pat') || '';
if (!PAT) { window.location.href = '/login'; }
const projectId = location.pathname.split('/')[2];
const STATES = ['backlog', 'todo', 'in_progress', 'qa', 'done', 'cancelled'];

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Authorization': `Bearer ${opts.pat || PAT}`, 'Content-Type': 'application/json', ...opts.headers },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 204) return null;
  const env = await res.json();
  if (env.meta && env.meta.error) throw new Error(env.meta.error);
  return env.data;
}

async function load() {
  const [project, issues, users] = await Promise.all([
    api(`/api/projects/${projectId}`),
    api(`/api/projects/${projectId}/issues`),
    api('/api/users'),
  ]);
  document.getElementById('project-name').textContent = project.name;

  const userMap = {};
  users.forEach(u => userMap[u.id] = u.display_name);

  const sel = document.getElementById('iassignee');
  sel.innerHTML = '<option value="">Unassigned</option>' + users.map(u =>
    `<option value="${u.id}">${u.display_name}</option>`
  ).join('');

  const byState = {};
  STATES.forEach(s => byState[s] = []);
  issues.forEach(i => { if (byState[i.state]) byState[i.state].push(i); });

  document.getElementById('board').innerHTML = STATES.map(s => `
    <div class="column">
      <h3>${s.replace('_', ' ')} (${byState[s].length})</h3>
      ${byState[s].map(i => `
        <div class="card priority-${i.priority}" onclick="location.href='/issues/${i.id}'">
          <div class="seq">${i.sequence_id}</div>
          <div class="title">${i.title}</div>
          ${i.assignee ? `<div class="assignee">${userMap[i.assignee] || ''}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function showCreate() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function createIssue() {
  const title = document.getElementById('ititle').value;
  if (!title) return;
  await api(`/api/projects/${projectId}/issues`, {
    method: 'POST',
    body: { title, description: document.getElementById('ibody').value, assignee: document.getElementById('iassignee').value }
  });
  document.getElementById('ititle').value = '';
  document.getElementById('ibody').value = '';
  closeModal();
  wsConnect();
load();
}

load();

function wsConnect() {
  const pat = document.querySelector('meta[name="default-pat"]')?.content || '';
  if (!pat) return;
  const ws = new WebSocket('ws://' + location.host + '/api/ws?pat=' + pat);
  ws.onopen = () => {};
  ws.onclose = () => { setTimeout(wsConnect, 3000); };
  ws.onerror = () => { ws.close(); };
  ws.onmessage = (msg) => {
    try {
      const ev = JSON.parse(msg.data);
      if (ev.type.startsWith('project_') || ev.type.startsWith('issue_') || ev.type.startsWith('comment_')) {
        load();
      }
    } catch(e) {}
  };
}

</script>
</body>
</html>
