<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goard — Project</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f5f7;color:#1a1a2e;padding:24px;overflow-x:hidden}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
.page{max-width:1400px;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#666;margin-bottom:16px}
.back:hover{color:#2563eb}
.header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.header h1{font-size:22px;font-weight:700}
.header small{font-size:13px;font-weight:400;color:#888}
.board{display:flex;gap:12px;min-height:50vh;overflow-x:auto;padding-bottom:12px}
.column{background:#eef0f4;border-radius:8px;padding:10px;min-width:240px;flex:1;display:flex;flex-direction:column}
.column-header{font-size:12px;font-weight:600;text-transform:uppercase;color:#666;padding:4px 8px 10px;display:flex;justify-content:space-between}
.column-header .count{background:#d0d3db;border-radius:10px;padding:0 8px;font-size:11px;line-height:18px}
.column-empty{font-size:12px;color:#999;padding:16px 8px;text-align:center;font-style:italic}
.card{background:#fff;border-radius:6px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .15s;border-left:3px solid transparent}
.card:hover{box-shadow:0 3px 8px rgba(0,0,0,.12)}
.card .seq{font-size:11px;color:#999}
.card .title{font-weight:500;font-size:14px;margin:3px 0;color:#1a1a2e}
.card .footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#888;margin-top:4px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.badge-bug{background:#fef2f2;color:#b91c1c}
.badge-feature{background:#eef2ff;color:#4338ca}
.badge-chore{background:#f5f5f5;color:#666}
.badge-improvement{background:#f0fdf4;color:#15803d}
.prio-1{border-left-color:#ef4444}
.prio-2{border-left-color:#f97316}
.prio-3{border-left-color:#eab308}
.prio-4{border-left-color:#22c55e}
.error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;color:#b91c1c;font-size:14px;display:none;margin-bottom:16px}
.error.show{display:block}
.loading{text-align:center;padding:48px 24px;color:#888}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">
  <a href="/" class="back">← All Projects</a>
  <div class="header">
    <h1 id="project-name">Loading… <small id="project-id"></small></h1>
  </div>
  <div class="error" id="error"></div>
  <div class="board" id="board">
    <div class="loading"><span class="spinner"></span>Loading issues…</div>
  </div>
</div>

<script>
const PAT = localStorage.getItem('pat') || '';
if (!PAT) { window.location.href = '/login'; }
const projectId = location.pathname.split('/')[2];
const STATES = ['backlog', 'in_progress', 'review', 'done', 'cancelled'];
const TYPE_BADGE = { bug: 'badge-bug', feature: 'badge-feature', chore: 'badge-chore', improvement: 'badge-improvement' };

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Authorization': `Bearer ${opts.pat || PAT}`, 'Content-Type': 'application/json', ...opts.headers },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})).then(d => d.meta?.error || d.error || res.statusText); throw new Error(e); }
  if (res.status === 204) return null;
  const env = await res.json();
  if (env.meta && env.meta.error) throw new Error(env.meta.error);
  return env.data;
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}

function esc(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

function $(id) { return document.getElementById(id); }

async function load() {
  try {
    const [project, issues, users] = await Promise.all([
      api(`/api/projects/${projectId}`),
      api(`/api/projects/${projectId}/issues`),
      api('/api/users'),
    ]);

    const nameEl = $('project-name');
    const idEl = $('project-id');
    const board = $('board');
    if (nameEl) nameEl.textContent = project.name;
    if (idEl) idEl.textContent = '#' + project.id;
    if (!board) { showError('Board element missing'); return; }

    const userMap = {};
    (users || []).forEach(u => userMap[u.id] = u.username);

    const byState = {};
    STATES.forEach(s => byState[s] = []);
    (issues || []).forEach(i => { if (byState[i.state]) byState[i.state].push(i); });

    board.innerHTML = STATES.map(s => {
      const items = byState[s];
      return `
        <div class="column">
          <div class="column-header">
            <span>${s.replace(/_/g, ' ')}</span>
            <span class="count">${items.length}</span>
          </div>
          ${items.length === 0 ? '<div class="column-empty">No issues</div>' : items.map(i => `
            <div class="card prio-${i.priority}" onclick="location.href='/issues/${i.id}'">
              <div class="seq">${i.slug}</div>
              <div class="title">${esc(i.title)}</div>
              <div class="footer">
                <span class="badge ${TYPE_BADGE[i.type] || ''}">${i.type}</span>
                <span>${i.assignee ? esc(userMap[i.assignee.id] || '') : ''}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  } catch (e) {
    showError('Failed to load: ' + e.message);
    const board = $('board');
    if (board) board.innerHTML = '<div class="loading">Failed to load project.</div>';
  }
}

load();

function wsConnect() {
  const pat = document.querySelector('meta[name="default-pat"]')?.content || '';
  if (!pat) return;
  const ws = new WebSocket('ws://' + location.host + '/api/ws?pat=' + pat);
  ws.onclose = () => { setTimeout(wsConnect, 3000); };
  ws.onerror = () => { ws.close(); };
  ws.onmessage = (msg) => {
    try { const ev = JSON.parse(msg.data); if (ev.type.startsWith('project_') || ev.type.startsWith('issue_')) load(); } catch(e) {}
  };
}
wsConnect();
</script>
</body>
</html>
